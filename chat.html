<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Groups</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --primary: #5b5fc7; --bg: #11100f; --text: #ffffff; --border: #3b3a39; }
        .light-mode { --bg: #f5f5f5; --text: #242424; --border: #edebe9; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; }
        .sidebar { width: 300px; border-right: 1px solid var(--border); background: #201f1e; padding: 15px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .footer { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .footer.disabled { opacity: 0.3; pointer-events: none; }
        .search-results { background: #2d2c2c; border: 1px solid var(--primary); border-radius: 4px; margin-top: 5px; cursor: pointer; }
        .msg { padding: 8px 12px; border-radius: 6px; max-width: 70%; }
        .sent { background: var(--primary); align-self: flex-end; color: white; }
        .received { background: var(--border); align-self: flex-start; }
    </style>
</head>
<body>
    <div class="sidebar">
        <input type="text" id="find-user" placeholder="Search email..." style="width:100%; padding:8px;">
        <div id="results" class="search-results"></div>
    </div>
    <div class="main">
        <div id="messages"></div>
        <div class="footer disabled" id="input-bar">
            <input type="text" id="msg-input" placeholder="Type here..." style="flex:1;">
            <button id="send">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJ55WRtAvAXaUerycWjb1-Zf1E-VEmDDo",
            authDomain: "groups-85638.firebaseapp.com",
            databaseURL: "https://groups-85638-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "groups-85638",
            appId: "1:751289139753:web:83e9bcb431c1a5ebfbd238"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let activeUser = null;

        onAuthStateChanged(auth, user => { if (!user) window.location.href = "index.html"; });

        document.getElementById('find-user').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (query.length < 3) return;
            get(ref(db, 'users')).then(snap => {
                const results = document.getElementById('results');
                results.innerHTML = "";
                if (snap.exists()) {
                    Object.values(snap.val()).forEach(u => {
                        if (u.email.includes(query) && u.email !== auth.currentUser.email) {
                            const div = document.createElement('div');
                            div.innerText = u.email;
                            div.onclick = () => startChat(u.email);
                            results.appendChild(div);
                        }
                    });
                }
            });
        });

        function startChat(email) {
            activeUser = email;
            document.getElementById('input-bar').classList.remove('disabled');
            const chatID = [auth.currentUser.email, email].sort().map(e => e.replace(/\./g, '_')).join('--');
            onValue(ref(db, 'chats/' + chatID), snap => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                if (snap.exists()) {
                    Object.values(snap.val()).forEach(m => {
                        const div = document.createElement('div');
                        div.className = `msg ${m.sender === auth.currentUser.email ? 'sent' : 'received'}`;
                        div.innerText = m.text;
                        box.appendChild(div);
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }

        document.getElementById('send').onclick = () => {
            const input = document.getElementById('msg-input');
            if (!input.value || !activeUser) return;
            const chatID = [auth.currentUser.email, activeUser].sort().map(e => e.replace(/\./g, '_')).join('--');
            push(ref(db, 'chats/' + chatID), {
                sender: auth.currentUser.email,
                text: input.value,
                time: serverTimestamp()
            }).then(() => input.value = "");
        };
    </script>
</body>
</html>
