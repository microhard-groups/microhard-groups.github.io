<!DOCTYPE html>
<html style="background-color:#11100f;">
<head>
    <title>Groups - Chat</title>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:#11100f; color:white; font-family:'Segoe UI',sans-serif; display:flex; height:100vh; overflow:hidden; }

        /* ── Sidebar ── */
        .sidebar { width:300px; border-right:1px solid #3b3a39; background:#201f1e; padding:16px; display:flex; flex-direction:column; gap:12px; flex-shrink:0; }
        .sidebar-top { display:flex; align-items:center; justify-content:space-between; }
        .sidebar-top h3 { font-size:1.1rem; font-weight:700; }
        #logoutBtn { padding:6px 12px; background:transparent; border:1px solid #3b3a39; color:#888; border-radius:8px; cursor:pointer; font-size:0.8rem; }
        #logoutBtn:hover { background:#2d2c2c; color:white; }
        #userSearch { width:100%; padding:10px 14px; background:#11100f; border:1px solid #3b3a39; color:white; border-radius:8px; font-size:0.9rem; }
        #userSearch:focus { outline:none; border-color:#5b5fc7; }
        #userSearch::placeholder { color:#555; }
        #results { background:#2d2c2c; border-radius:8px; border:1px solid #5b5fc7; display:none; overflow:hidden; }
        .user-item { padding:12px 14px; cursor:pointer; border-bottom:1px solid #3b3a39; font-size:0.9rem; }
        .user-item:last-child { border-bottom:none; }
        .user-item:hover { background:#5b5fc7; }
        .no-result { padding:12px 14px; color:#888; font-size:0.85rem; }
        .section-label { font-size:0.72rem; color:#555; text-transform:uppercase; letter-spacing:0.08em; padding:0 4px; }
        #chatList { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
        .chat-entry { padding:10px 12px; border-radius:8px; cursor:pointer; display:flex; flex-direction:column; gap:2px; }
        .chat-entry:hover { background:#2d2c2c; }
        .chat-entry.active { background:#5b5fc7; }
        .chat-entry .ce-name { font-size:0.88rem; color:#ccc; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-entry.active .ce-name { color:white; }
        .chat-entry .ce-preview { font-size:0.78rem; color:#555; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-entry.active .ce-preview { color:rgba(255,255,255,0.6); }
        .no-chats { font-size:0.82rem; color:#444; padding:8px 4px; }

        /* ── Main ── */
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }

        /* Header */
        #chat-header { padding:0 20px; border-bottom:1px solid #3b3a39; background:#161514; display:flex; align-items:center; justify-content:space-between; height:54px; flex-shrink:0; }
        #chat-header-name { font-weight:600; font-size:0.95rem; color:#ccc; }
        .header-actions { display:flex; gap:8px; }
        .icon-btn { background:transparent; border:none; color:#888; cursor:pointer; padding:6px; border-radius:8px; display:flex; align-items:center; justify-content:center; transition:background 0.15s,color 0.15s; }
        .icon-btn:hover { background:#2d2c2c; color:white; }
        .icon-btn svg { width:18px; height:18px; }

        /* Messages */
        #messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
        .empty-state { margin:auto; color:#444; font-size:0.9rem; text-align:center; }

        /* Message wrap */
        .msg-wrap { display:flex; flex-direction:column; position:relative; padding:2px 0; }
        .msg-wrap.sent { align-items:flex-end; }
        .msg-wrap.received { align-items:flex-start; }
        .msg-sender { font-size:0.72rem; color:rgba(255,255,255,0.4); margin-bottom:3px; padding:0 4px; }

        /* The bubble row — holds bubble + action buttons */
        .bubble-row { display:flex; align-items:center; gap:6px; position:relative; max-width:70%; }
        .msg-wrap.sent .bubble-row { flex-direction:row-reverse; }

        .msg-bubble {
            padding:10px 15px; border-radius:16px; line-height:1.5;
            font-size:0.92rem; word-break:break-word; position:relative;
            min-width:60px;
        }
        .sent .msg-bubble { background:#5b5fc7; border-bottom-right-radius:4px; }
        .received .msg-bubble { background:#2d2c2b; border-bottom-left-radius:4px; }

        /* Image messages */
        .msg-bubble img { max-width:280px; max-height:280px; border-radius:10px; display:block; cursor:pointer; }

        /* Reply preview inside bubble */
        .reply-preview {
            background:rgba(0,0,0,0.25); border-left:3px solid rgba(255,255,255,0.4);
            border-radius:6px; padding:6px 10px; margin-bottom:6px;
            font-size:0.78rem; color:rgba(255,255,255,0.6); cursor:pointer;
        }
        .reply-preview .rp-sender { font-weight:600; margin-bottom:2px; color:rgba(255,255,255,0.8); }

        /* Edited label */
        .msg-edited { font-size:0.68rem; color:rgba(255,255,255,0.35); margin-top:3px; display:block; text-align:right; }

        /* Hover action buttons */
        .msg-actions { display:none; flex-direction:column; gap:3px; }
        .msg-wrap:hover .msg-actions { display:flex; }
        .act-btn {
            background:#2d2c2b; border:1px solid #3b3a39; color:#aaa;
            border-radius:6px; cursor:pointer; width:28px; height:28px;
            display:flex; align-items:center; justify-content:center;
            transition:background 0.15s,color 0.15s;
        }
        .act-btn:hover { background:#5b5fc7; color:white; border-color:#5b5fc7; }
        .act-btn svg { width:13px; height:13px; }

        /* Context menu */
        #ctx-menu {
            position:fixed; background:#2d2c2b; border:1px solid #3b3a39;
            border-radius:10px; padding:6px; z-index:1000; display:none;
            box-shadow:0 8px 24px rgba(0,0,0,0.5); min-width:160px;
        }
        .ctx-item { padding:8px 14px; border-radius:6px; cursor:pointer; font-size:0.88rem; display:flex; align-items:center; gap:10px; color:#ccc; }
        .ctx-item:hover { background:#3b3a39; color:white; }
        .ctx-item.danger { color:#f87171; }
        .ctx-item.danger:hover { background:#3b1f1f; }
        .ctx-sep { height:1px; background:#3b3a39; margin:4px 0; }

        /* Reply bar above footer */
        #reply-bar {
            display:none; padding:10px 20px; background:#1a1918;
            border-top:1px solid #3b3a39; align-items:center; gap:10px;
        }
        #reply-bar.visible { display:flex; }
        .reply-bar-content { flex:1; font-size:0.82rem; color:#aaa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .reply-bar-content strong { color:#5b5fc7; }
        #reply-cancel { background:transparent; border:none; color:#666; cursor:pointer; font-size:1.1rem; line-height:1; padding:2px 6px; border-radius:4px; }
        #reply-cancel:hover { color:white; }

        /* Footer */
        .footer { padding:14px 20px; border-top:1px solid #3b3a39; display:flex; gap:8px; align-items:center; background:#161514; }
        .attach-btn { background:transparent; border:none; color:#888; cursor:pointer; padding:6px; border-radius:8px; display:flex; align-items:center; flex-shrink:0; }
        .attach-btn:hover { color:#5b5fc7; }
        .attach-btn svg { width:20px; height:20px; }
        #fileInput { display:none; }
        #msgInput { flex:1; padding:12px 16px; background:#2d2c2b; border:1px solid #3b3a39; color:white; border-radius:24px; font-size:0.92rem; }
        #msgInput:focus { outline:none; border-color:#5b5fc7; }
        #msgInput::placeholder { color:#555; }
        #msgInput:disabled { opacity:0.4; cursor:not-allowed; }
        #sendBtn { background:#5b5fc7; color:white; border:none; padding:10px 22px; border-radius:24px; cursor:pointer; font-weight:600; font-size:0.9rem; flex-shrink:0; }
        #sendBtn:hover { opacity:0.85; }
        #sendBtn:disabled { background:#333; cursor:not-allowed; opacity:1; }

        /* ── Settings Modal ── */
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500; display:none; align-items:center; justify-content:center; }
        .modal-overlay.visible { display:flex; }
        .modal { background:#201f1e; border:1px solid #3b3a39; border-radius:16px; padding:28px; width:360px; max-width:90vw; }
        .modal h2 { font-size:1.1rem; margin-bottom:20px; }
        .modal label { font-size:0.82rem; color:#888; display:block; margin-bottom:6px; }
        .modal input { width:100%; padding:10px 14px; background:#11100f; border:1px solid #3b3a39; color:white; border-radius:8px; font-size:0.9rem; margin-bottom:16px; }
        .modal input:focus { outline:none; border-color:#5b5fc7; }
        .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }
        .btn-secondary { padding:9px 18px; background:transparent; border:1px solid #3b3a39; color:#aaa; border-radius:8px; cursor:pointer; font-size:0.88rem; }
        .btn-secondary:hover { background:#2d2c2c; color:white; }
        .btn-primary { padding:9px 18px; background:#5b5fc7; border:none; color:white; border-radius:8px; cursor:pointer; font-size:0.88rem; font-weight:600; }
        .btn-primary:hover { opacity:0.85; }
        .modal-status { font-size:0.82rem; color:#4ade80; min-height:18px; margin-top:-8px; margin-bottom:8px; }

        /* Image lightbox */
        #lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:600; display:none; align-items:center; justify-content:center; cursor:zoom-out; }
        #lightbox.visible { display:flex; }
        #lightbox img { max-width:90vw; max-height:90vh; border-radius:8px; }

        /* Edit input inside bubble */
        .edit-input { background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.4); color:white; font-size:0.92rem; width:100%; outline:none; padding:2px 0; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-top">
        <h3>Groups</h3>
        <button id="logoutBtn">Sign Out</button>
    </div>
    <input type="text" id="userSearch" placeholder="Search by email…">
    <div id="results"></div>
    <span class="section-label">Conversations</span>
    <div id="chatList"><div class="no-chats">No conversations yet.</div></div>
</div>

<!-- Main -->
<div class="main">
    <div id="chat-header">
        <span id="chat-header-name">Select a conversation</span>
        <div class="header-actions">
            <button class="icon-btn" id="settingsBtn" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="messages"><div class="empty-state"><p>Search for someone to start chatting</p></div></div>

    <!-- Reply bar -->
    <div id="reply-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5b5fc7" stroke-width="2.5"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>
        <div class="reply-bar-content" id="reply-bar-text"></div>
        <button id="reply-cancel">✕</button>
    </div>

    <div class="footer">
        <button class="attach-btn" id="attachBtn" title="Attach file" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
        </button>
        <input type="file" id="fileInput" accept="image/*,video/*,.pdf,.doc,.docx,.txt">
        <input type="text" id="msgInput" placeholder="Select a contact…" disabled>
        <button id="sendBtn" disabled>Send</button>
    </div>
</div>

<!-- Context menu -->
<div id="ctx-menu"></div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h2>Settings</h2>
        <label>Display Name</label>
        <input type="text" id="usernameInput" placeholder="Enter your name…" maxlength="32">
        <div class="modal-status" id="settings-status"></div>
        <label>Email</label>
        <input type="text" id="emailDisplay" disabled>
        <div class="modal-actions">
            <button class="btn-secondary" id="closeSettings">Cancel</button>
            <button class="btn-primary" id="saveSettings">Save</button>
        </div>
    </div>
</div>

<!-- Image lightbox -->
<div id="lightbox"><img id="lightbox-img" src="" alt=""></div>

<script type="module">
    import { initializeApp } from 'https://esm.sh/firebase/app';
    import { getAuth, onAuthStateChanged, signOut } from 'https://esm.sh/firebase/auth';
    import { getDatabase, ref, get, push, onValue, set, update, remove, serverTimestamp } from 'https://esm.sh/firebase/database';


    const app = initializeApp({
        apiKey: "AIzaSyBJ55WRtAvAXaUerycWjb1-Zf1E-VEmDDo",
        authDomain: "groups-85638.firebaseapp.com",
        databaseURL: "https://groups-85638-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "groups-85638",
        appId: "1:751289139753:web:83e9bcb431c1a5ebfbd238"
    });
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let currentUsername = '';
    let activeChat = null;
    let activeChatUnsub = null;
    let conversationsUnsub = null;
    let replyTo = null; // { msgKey, sender, text }
    let ctxTarget = null; // { msgKey, isSent, text }

    // ── Auth ──
    onAuthStateChanged(auth, async user => {
        if (!user) { window.location.href = 'index.html'; return; }
        currentUser = user;
        // Load username
        const snap = await get(ref(db, 'users/' + user.uid));
        if (snap.exists()) {
            currentUsername = snap.val().username || '';
        }
        loadConversations();
    });

    document.getElementById('logoutBtn').addEventListener('click', () =>
        signOut(auth).then(() => window.location.href = 'index.html')
    );

    // ── Settings ──
    document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('usernameInput').value = currentUsername;
        document.getElementById('emailDisplay').value = currentUser.email;
        document.getElementById('settings-status').textContent = '';
        document.getElementById('settingsModal').classList.add('visible');
    });
    document.getElementById('closeSettings').addEventListener('click', () =>
        document.getElementById('settingsModal').classList.remove('visible')
    );
    document.getElementById('settingsModal').addEventListener('click', e => {
        if (e.target === document.getElementById('settingsModal'))
            document.getElementById('settingsModal').classList.remove('visible');
    });
    document.getElementById('saveSettings').addEventListener('click', async () => {
        const name = document.getElementById('usernameInput').value.trim();
        if (!name) { document.getElementById('settings-status').textContent = 'Name cannot be empty.'; return; }
        await update(ref(db, 'users/' + currentUser.uid), { username: name });
        currentUsername = name;
        document.getElementById('settings-status').textContent = '✓ Saved!';
        setTimeout(() => document.getElementById('settingsModal').classList.remove('visible'), 800);
    });

    // ── Conversations ──
    function loadConversations() {
        if (conversationsUnsub) conversationsUnsub();
        conversationsUnsub = onValue(ref(db, 'conversations/' + currentUser.uid), snap => {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            if (!snap.exists()) { list.innerHTML = '<div class="no-chats">No conversations yet.</div>'; return; }
            Object.entries(snap.val())
                .sort((a, b) => (b[1].lastTimestamp || 0) - (a[1].lastTimestamp || 0))
                .forEach(([, data]) => renderChatEntry(data.email, data.displayName || data.email, data.lastMessage || ''));
            if (activeChat) {
                const el = document.querySelector(`.chat-entry[data-email="${activeChat}"]`);
                if (el) el.classList.add('active');
            }
        });
    }

    function renderChatEntry(email, displayName, preview) {
        const list = document.getElementById('chatList');
        list.querySelector('.no-chats')?.remove();
        if (document.querySelector(`.chat-entry[data-email="${email}"]`)) return;
        const entry = document.createElement('div');
        entry.className = 'chat-entry';
        entry.setAttribute('data-email', email);
        entry.innerHTML = `<span class="ce-name">${esc(displayName)}</span><span class="ce-preview">${esc(preview)}</span>`;
        entry.addEventListener('click', () => openChat(email));
        list.appendChild(entry);
    }

    // ── Search ──
    let searchTimeout = null;
    document.getElementById('userSearch').addEventListener('input', e => {
        clearTimeout(searchTimeout);
        const q = e.target.value.toLowerCase().trim();
        const resDiv = document.getElementById('results');
        if (q.length < 3) { resDiv.style.display = 'none'; resDiv.innerHTML = ''; return; }
        searchTimeout = setTimeout(async () => {
            resDiv.innerHTML = ''; resDiv.style.display = 'block';
            const snap = await get(ref(db, 'users'));
            if (!snap.exists()) { resDiv.innerHTML = '<div class="no-result">No users found.</div>'; return; }
            const matches = Object.values(snap.val()).filter(u => u.email && u.email.includes(q) && u.email !== currentUser.email);
            if (!matches.length) { resDiv.innerHTML = '<div class="no-result">No account with that email exists.</div>'; return; }
            matches.forEach(u => {
                const d = document.createElement('div');
                d.className = 'user-item';
                d.textContent = u.username ? `${u.username} (${u.email})` : u.email;
                d.addEventListener('click', () => {
                    resDiv.style.display = 'none';
                    document.getElementById('userSearch').value = '';
                    openChat(u.email);
                });
                resDiv.appendChild(d);
            });
        }, 250);
    });

    // ── Open chat ──
    function getChatID(a, b) { return [a, b].sort().map(x => x.replace(/[.#$[\]]/g, '_')).join('--'); }

    async function getDisplayName(email) {
        const snap = await get(ref(db, 'users'));
        if (snap.exists()) {
            const match = Object.values(snap.val()).find(u => u.email === email);
            if (match && match.username) return match.username;
        }
        return email;
    }

    async function openChat(email) {
        activeChat = email;
        const displayName = await getDisplayName(email);
        document.getElementById('chat-header-name').textContent = displayName;
        const msgInput = document.getElementById('msgInput');
        msgInput.disabled = false;
        msgInput.placeholder = `Message ${displayName}…`;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('attachBtn').disabled = false;
        msgInput.focus();

        document.querySelectorAll('.chat-entry').forEach(el => el.classList.remove('active'));
        document.querySelector(`.chat-entry[data-email="${email}"]`)?.classList.add('active');

        if (activeChatUnsub) activeChatUnsub();
        clearReply();

        const chatID = getChatID(currentUser.email, email);
        activeChatUnsub = onValue(ref(db, 'chats/' + chatID), async snap => {
            const mBox = document.getElementById('messages');
            mBox.innerHTML = '';
            if (!snap.exists()) { mBox.innerHTML = '<div class="empty-state"><p>No messages yet. Say hi!</p></div>'; return; }

            // Build a key->msg map for reply lookups
            const msgMap = snap.val();

            for (const [key, m] of Object.entries(msgMap)) {
                if (m.deleted) {
                    const wrap = document.createElement('div');
                    wrap.className = 'msg-wrap ' + (m.sender === currentUser.email ? 'sent' : 'received');
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble-row';
                    const b = document.createElement('div');
                    b.className = 'msg-bubble';
                    b.style.opacity = '0.45';
                    b.style.fontStyle = 'italic';
                    b.style.fontSize = '0.82rem';
                    b.textContent = 'This message was deleted.';
                    bubble.appendChild(b);
                    wrap.appendChild(bubble);
                    mBox.appendChild(wrap);
                    continue;
                }

                const isSent = m.sender === currentUser.email;
                const senderName = isSent ? (currentUsername || 'You') : await getDisplayName(m.sender);

                const wrap = document.createElement('div');
                wrap.className = 'msg-wrap ' + (isSent ? 'sent' : 'received');
                wrap.setAttribute('data-key', key);

                const senderLabel = document.createElement('div');
                senderLabel.className = 'msg-sender';
                senderLabel.textContent = senderName;

                const bubbleRow = document.createElement('div');
                bubbleRow.className = 'bubble-row';

                // Action buttons (hover)
                const actions = document.createElement('div');
                actions.className = 'msg-actions';

                // Reply button — shown for all messages
                const replyBtn = makeActBtn(`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>`, 'Reply');
                replyBtn.addEventListener('click', e => { e.stopPropagation(); setReply(key, senderName, m.text || '[image]'); });
                actions.appendChild(replyBtn);

                if (isSent) {
                    // Three dots button
                    const dotsBtn = makeActBtn(`<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>`, 'More');
                    dotsBtn.addEventListener('click', e => { e.stopPropagation(); showCtxMenu(e, key, isSent, m.text || '', m.imageData || ''); });
                    actions.appendChild(dotsBtn);
                }

                // Bubble
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';

                // Reply preview
                if (m.replyTo && msgMap[m.replyTo]) {
                    const orig = msgMap[m.replyTo];
                    const origName = orig.sender === currentUser.email ? (currentUsername || 'You') : await getDisplayName(orig.sender);
                    const rp = document.createElement('div');
                    rp.className = 'reply-preview';
                    rp.innerHTML = `<div class="rp-sender">${esc(origName)}</div><div>${esc(orig.text || '[image]')}</div>`;
                    rp.addEventListener('click', () => {
                        const target = mBox.querySelector(`[data-key="${m.replyTo}"]`);
                        if (target) target.scrollIntoView({ behavior:'smooth', block:'center' });
                    });
                    bubble.appendChild(rp);
                }

                if (m.imageData) {
                    const img = document.createElement('img');
                    img.src = m.imageData;
                    img.alt = 'image';
                    img.addEventListener('click', () => openLightbox(m.imageData));
                    bubble.appendChild(img);
                } else if (m.fileData) {
                    const a = document.createElement('a');
                    a.href = m.fileData;
                    a.download = m.fileName || 'attachment';
                    a.style.cssText = 'color:#93c5fd;text-decoration:underline;font-size:0.88rem;';
                    a.textContent = '📎 ' + (m.fileName || 'Attachment');
                    bubble.appendChild(a);
                } else {
                    bubble.appendChild(document.createTextNode(m.text || ''));
                }

                if (m.edited) {
                    const ed = document.createElement('span');
                    ed.className = 'msg-edited';
                    ed.textContent = 'edited';
                    bubble.appendChild(ed);
                }

                if (isSent) {
                    bubbleRow.appendChild(actions);
                    bubbleRow.appendChild(bubble);
                } else {
                    bubbleRow.appendChild(bubble);
                    bubbleRow.appendChild(actions);
                }

                wrap.appendChild(senderLabel);
                wrap.appendChild(bubbleRow);
                mBox.appendChild(wrap);

                // Right-click context menu
                wrap.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    showCtxMenu(e, key, isSent, m.text || '', m.imageData || '', senderName, m.text || '[image]');
                });
            }
            mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function makeActBtn(svgStr, title) {
        const btn = document.createElement('button');
        btn.className = 'act-btn'; btn.title = title;
        btn.innerHTML = svgStr;
        return btn;
    }

    // ── Context menu ──
    function showCtxMenu(e, key, isSent, text, imageUrl, senderName, replyText) {
        ctxTarget = { key, isSent, text, imageUrl };
        const menu = document.getElementById('ctx-menu');
        menu.innerHTML = '';

        // Reply (everyone)
        const sn = senderName || (isSent ? (currentUsername || 'You') : '');
        const rt = replyText || text || '[image]';
        addCtxItem(menu, `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>`, 'Reply', () => setReply(key, sn, rt));

        if (isSent) {
            menu.appendChild(Object.assign(document.createElement('div'), { className:'ctx-sep' }));
            if (!imageUrl) {                addCtxItem(menu, `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`, 'Edit', () => startEdit(key, text));
            }
            addCtxItem(menu, `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>`, 'Delete', () => deleteMsg(key), true);
        }

        menu.style.display = 'block';
        // Position near cursor, keep on screen
        const x = Math.min(e.clientX, window.innerWidth - 180);
        const y = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 10);
        menu.style.left = x + 'px';
        menu.style.top = y + 'px';
    }

    function addCtxItem(menu, icon, label, cb, danger=false) {
        const item = document.createElement('div');
        item.className = 'ctx-item' + (danger ? ' danger' : '');
        item.innerHTML = `${icon}<span>${label}</span>`;
        item.addEventListener('click', () => { hideCtxMenu(); cb(); });
        menu.appendChild(item);
    }

    function hideCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; }
    document.addEventListener('click', hideCtxMenu);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { hideCtxMenu(); clearReply(); } });

    // ── Delete message ──
    async function deleteMsg(key) {
        const chatID = getChatID(currentUser.email, activeChat);
        await update(ref(db, 'chats/' + chatID + '/' + key), { deleted: true, text: '' });
    }

    // ── Edit message ──
    function startEdit(key, currentText) {
        const wrap = document.querySelector(`[data-key="${key}"]`);
        if (!wrap) return;
        const bubble = wrap.querySelector('.msg-bubble');
        bubble.innerHTML = '';
        const inp = document.createElement('input');
        inp.className = 'edit-input';
        inp.value = currentText;
        bubble.appendChild(inp);
        inp.focus();
        inp.select();
        inp.addEventListener('keydown', async e => {
            if (e.key === 'Enter') {
                const newText = inp.value.trim();
                if (!newText) return;
                const chatID = getChatID(currentUser.email, activeChat);
                await update(ref(db, 'chats/' + chatID + '/' + key), { text: newText, edited: true });
            }
            if (e.key === 'Escape') { openChat(activeChat); } // re-render
        });
    }

    // ── Reply ──
    function setReply(key, senderName, text) {
        replyTo = { key, senderName, text };
        document.getElementById('reply-bar-text').innerHTML = `<strong>${esc(senderName)}</strong>: ${esc(text)}`;
        document.getElementById('reply-bar').classList.add('visible');
        document.getElementById('msgInput').focus();
    }

    function clearReply() {
        replyTo = null;
        document.getElementById('reply-bar').classList.remove('visible');
        document.getElementById('reply-bar-text').innerHTML = '';
    }

    document.getElementById('reply-cancel').addEventListener('click', clearReply);

    // ── Attach file ──
    document.getElementById('attachBtn').addEventListener('click', () => {
        if (!activeChat) return;
        document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file || !activeChat) return;
        e.target.value = '';

        const btn = document.getElementById('attachBtn');
        btn.style.opacity = '0.4';
        btn.style.pointerEvents = 'none';

        try {
            const isImage = file.type.startsWith('image/');
            if (isImage) {
                // Compress via canvas before storing in Realtime DB (no Storage needed)
                const compressed = await compressImage(file, 900, 0.75);
                await pushMessage({ sender: currentUser.email, timestamp: serverTimestamp(), imageData: compressed }, '[image]');
            } else {
                if (file.size > 500 * 1024) {
                    alert('Non-image files must be under 500KB.');
                    btn.style.opacity = ''; btn.style.pointerEvents = '';
                    return;
                }
                const base64 = await readAsBase64(file);
                await pushMessage({ sender: currentUser.email, timestamp: serverTimestamp(), fileData: base64, fileName: file.name, fileType: file.type }, `📎 ${file.name}`);
            }
        } catch (err) {
            alert('Failed to send: ' + err.message);
        }

        btn.style.opacity = '';
        btn.style.pointerEvents = '';
    });

    function compressImage(file, maxPx, quality) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = () => {
                URL.revokeObjectURL(url);
                let { width, height } = img;
                if (width > maxPx || height > maxPx) {
                    if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
                    else { width = Math.round(width * maxPx / height); height = maxPx; }
                }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
            img.src = url;
        });
    }

    function readAsBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ── Send text ──
    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !activeChat) return;
        input.value = '';
        await pushMessage({ sender: currentUser.email, text, timestamp: serverTimestamp() }, text);
    }

    async function pushMessage(data, previewText) {
        if (replyTo) { data.replyTo = replyTo.key; clearReply(); }

        const chatID = getChatID(currentUser.email, activeChat);
        await push(ref(db, 'chats/' + chatID), data);

        const ts = Date.now();
        const myKey = activeChat.replace(/[.#$[\]]/g, '_');
        const theirKey = currentUser.email.replace(/[.#$[\]]/g, '_');
        const myName = currentUsername || currentUser.email;

        await set(ref(db, 'conversations/' + currentUser.uid + '/' + myKey), {
            email: activeChat, lastMessage: previewText, lastTimestamp: ts
        });

        const usersSnap = await get(ref(db, 'users'));
        if (usersSnap.exists()) {
            const match = Object.values(usersSnap.val()).find(u => u.email === activeChat);
            if (match) {
                await set(ref(db, 'conversations/' + match.uid + '/' + theirKey), {
                    email: currentUser.email,
                    displayName: myName,
                    lastMessage: previewText,
                    lastTimestamp: ts
                });
            }
        }
    }

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ── Lightbox ──
    function openLightbox(src) {
        document.getElementById('lightbox-img').src = src;
        document.getElementById('lightbox').classList.add('visible');
    }
    document.getElementById('lightbox').addEventListener('click', () =>
        document.getElementById('lightbox').classList.remove('visible')
    );

    // ── Helpers ──
    function esc(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
