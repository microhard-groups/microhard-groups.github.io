<!DOCTYPE html>
<html style="background-color:#11100f;">
<link rel="icon" href="favicon.png" type="image/png">
<head>
    <title>Groups - Chat</title>
    <style>
        * { box-sizing:border-box; }
        body { margin:0; background:#11100f; color:white; font-family:'Segoe UI',sans-serif; display:flex; height:100vh; overflow:hidden; }
        .sidebar { width:300px; border-right:1px solid #3b3a39; background:#201f1e; padding:20px; display:flex; flex-direction:column; }
        .sidebar h3 { margin:0 0 16px 0; font-size:1.2rem; }
        #userSearch { width:100%; padding:10px 14px; background:#11100f; border:1px solid #3b3a39; color:white; border-radius:8px; font-size:0.9rem; }
        #userSearch:focus { outline:none; border-color:#5b5fc7; }
        #userSearch::placeholder { color:#555; }
        #results { background:#2d2c2c; border-radius:8px; border:1px solid #5b5fc7; display:none; margin-top:6px; overflow:hidden; max-height:300px; overflow-y:auto; }
        .user-item { padding:12px 14px; cursor:pointer; border-bottom:1px solid #3b3a39; font-size:0.9rem; }
        .user-item:last-child { border-bottom:none; }
        .user-item:hover { background:#5b5fc7; }
        .no-result { padding:12px 14px; color:#888; font-size:0.85rem; }
        #chatList { margin-top:16px; flex:1; overflow-y:auto; }
        .chat-entry { padding:12px 14px; border-radius:8px; cursor:pointer; font-size:0.88rem; color:#ccc; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
        .chat-entry:hover { background:#2d2c2c; }
        .chat-entry.active { background:#5b5fc7; color:white; }
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
        #chat-header { padding:16px 20px; border-bottom:1px solid #3b3a39; font-weight:600; font-size:0.95rem; color:#ccc; background:#161514; }
        #messages { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:8px; }
        .msg-wrap { display:flex; flex-direction:column; }
        .msg-wrap.sent { align-items:flex-end; }
        .msg-wrap.received { align-items:flex-start; }
        .msg { padding:10px 15px; border-radius:16px; max-width:65%; line-height:1.5; font-size:0.92rem; word-break:break-word; }
        .sent .msg { background:#5b5fc7; border-bottom-right-radius:4px; }
        .received .msg { background:#2d2c2b; border-bottom-left-radius:4px; }
        .msg-sender { font-size:0.72rem; color:rgba(255,255,255,0.4); margin-bottom:3px; }
        .empty-state { margin:auto; color:#444; font-size:0.9rem; text-align:center; }
        .footer { padding:16px 20px; border-top:1px solid #3b3a39; display:flex; gap:10px; background:#161514; }
        #msgInput { flex:1; padding:12px 16px; background:#2d2c2b; border:1px solid #3b3a39; color:white; border-radius:24px; font-size:0.92rem; }
        #msgInput:focus { outline:none; border-color:#5b5fc7; }
        #msgInput::placeholder { color:#555; }
        #sendBtn { background:#5b5fc7; color:white; border:none; padding:10px 22px; border-radius:24px; cursor:pointer; font-weight:600; }
        #sendBtn:disabled { background:#333; cursor:not-allowed; }
        #logoutBtn { margin-top:auto; padding:10px; background:transparent; border:1px solid #3b3a39; color:#888; border-radius:8px; cursor:pointer; font-size:0.85rem; width:100%; }
        #logoutBtn:hover { background:#2d2c2c; color:white; }
    </style>
</head>
    <!-- Footer Link -->
    <footer style="position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 0.75rem; color: #64748b; text-align: center; z-index: 100;">
        <a href="https://group-chats.github.io/tos/terms-of-service.html" style="color: #64748b; text-decoration: none;">Terms of Service</a>
    </footer>
<body>
<div class="sidebar">
    <h3>💬 Groups</h3>
    <input type="text" id="userSearch" placeholder="Search by email…">
    <div id="results"></div>
    <div id="chatList"></div>
    <button id="logoutBtn">Sign Out</button>
</div>
<div class="main">
    <div id="chat-header">Select a conversation</div>
    <div id="messages"><div class="empty-state"><p>Search for someone to start chatting 👆</p></div></div>
    <div class="footer">
        <input type="text" id="msgInput" placeholder="Select a contact…" disabled>
        <button id="sendBtn" disabled>Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://esm.sh/firebase/app';
    import { getAuth, onAuthStateChanged, signOut } from 'https://esm.sh/firebase/auth';
    import { getDatabase, ref, get, push, onValue, serverTimestamp } from 'https://esm.sh/firebase/database';

    const app = initializeApp({
        apiKey: "AIzaSyBJ55WRtAvAXaUerycWjb1-Zf1E-VEmDDo",
        authDomain: "groups-85638.firebaseapp.com",
        databaseURL: "https://groups-85638-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "groups-85638",
        appId: "1:751289139753:web:83e9bcb431c1a5ebfbd238"
    });

    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let activeChat = null;
    let activeChatUnsub = null;

    onAuthStateChanged(auth, user => {
        if (!user) {
            window.location.href = 'authenticate.html';
            return;
        }
        currentUser = user;
        document.getElementById('chat-header').textContent = 'Signed in as ' + user.email;
        loadUserChats();
    });

    function getChatID(a, b) {
        return [a, b].sort().map(x => x.replace(/[.#$[\]]/g, '_')).join('--');
    }

    // Load previous chats from sidebar
    async function loadUserChats() {
        const list = document.getElementById('chatList');
        list.innerHTML = '';

        try {
            const usersSnap = await get(ref(db, 'users'));
            if (!usersSnap.exists()) return;

            // For simplicity we load all users and check which chats have messages
            const allUsers = Object.values(usersSnap.val());
            
            for (const u of allUsers) {
                if (u.email === currentUser.email) continue;
                const chatID = getChatID(currentUser.email, u.email);
                const chatSnap = await get(ref(db, 'chats/' + chatID));
                
                if (chatSnap.exists()) {
                    addToChatList(u.email);
                }
            }
        } catch (e) {
            console.error("Failed to load chats", e);
        }
    }

    function addToChatList(email) {
        const list = document.getElementById('chatList');
        if (document.querySelector(`.chat-entry[data-email="${email}"]`)) return;

        const entry = document.createElement('div');
        entry.className = 'chat-entry';
        entry.setAttribute('data-email', email);
        entry.textContent = email;
        entry.addEventListener('click', () => openChat(email));
        list.prepend(entry);
    }

    function openChat(email) {
        activeChat = email;
        document.getElementById('chat-header').textContent = 'Chat with ' + email;

        const msgInput = document.getElementById('msgInput');
        msgInput.disabled = false;
        msgInput.placeholder = `Message ${email}…`;
        document.getElementById('sendBtn').disabled = false;
        msgInput.focus();

        document.querySelectorAll('.chat-entry').forEach(el => el.classList.remove('active'));
        const activeEntry = document.querySelector(`.chat-entry[data-email="${email}"]`);
        if (activeEntry) activeEntry.classList.add('active');

        if (activeChatUnsub) activeChatUnsub();

        const chatID = getChatID(currentUser.email, email);

        activeChatUnsub = onValue(ref(db, 'chats/' + chatID), (snap) => {
            const mBox = document.getElementById('messages');
            mBox.innerHTML = '';

            if (!snap.exists()) {
                mBox.innerHTML = `<div class="empty-state"><p>No messages yet. Say hi! 👋</p></div>`;
                return;
            }

            const messages = Object.values(snap.val())
                .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

            messages.forEach(m => {
                const isSent = m.sender === currentUser.email;
                const wrap = document.createElement('div');
                wrap.className = `msg-wrap ${isSent ? 'sent' : 'received'}`;

                const label = document.createElement('div');
                label.className = 'msg-sender';
                label.textContent = isSent ? 'You' : m.sender.split('@')[0];

                const div = document.createElement('div');
                div.className = 'msg';
                div.textContent = m.text;

                wrap.appendChild(label);
                wrap.appendChild(div);
                mBox.appendChild(wrap);
            });

            mBox.scrollTop = mBox.scrollHeight;
        });
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        if (!text || !activeChat) return;

        const chatID = getChatID(currentUser.email, activeChat);

        push(ref(db, 'chats/' + chatID), {
            sender: currentUser.email,
            text: text,
            timestamp: serverTimestamp()
        });

        input.value = '';
    }

    // Search
    let searchTimeout = null;
    document.getElementById('userSearch').addEventListener('input', e => {
        clearTimeout(searchTimeout);
        const q = e.target.value.toLowerCase().trim();
        const resDiv = document.getElementById('results');

        if (q.length < 3) {
            resDiv.style.display = 'none';
            return;
        }

        searchTimeout = setTimeout(async () => {
            resDiv.innerHTML = '<div class="no-result">Searching...</div>';
            resDiv.style.display = 'block';

            try {
                const snap = await get(ref(db, 'users'));
                if (!snap.exists()) {
                    resDiv.innerHTML = '<div class="no-result">No users found.</div>';
                    return;
                }

                const matches = Object.values(snap.val())
                    .filter(u => u.email && u.email.toLowerCase().includes(q) && u.email !== currentUser?.email);

                resDiv.innerHTML = '';

                if (matches.length === 0) {
                    resDiv.innerHTML = '<div class="no-result">No user found with that email.</div>';
                    return;
                }

                matches.forEach(u => {
                    const d = document.createElement('div');
                    d.className = 'user-item';
                    d.textContent = u.email;
                    d.addEventListener('click', () => {
                        resDiv.style.display = 'none';
                        document.getElementById('userSearch').value = '';
                        openChat(u.email);
                        addToChatList(u.email);   // Add to sidebar immediately
                    });
                    resDiv.appendChild(d);
                });
            } catch (err) {
                console.error(err);
                resDiv.innerHTML = '<div class="no-result">Search failed.</div>';
            }
        }, 250);
    });

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => window.location.href = 'authenticate.html');
    });
</script>
</body>
</html>
