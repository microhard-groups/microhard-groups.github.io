<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // USE YOUR REAL API KEY HERE (The one from your main.js)
    const firebaseConfig = {
        apiKey: "AIzaSyBJ55WRtAvAXaUerycWjb1-Zf1E-VEmDDo",
        authDomain: "groups-85638.firebaseapp.com",
        databaseURL: "https://groups-85638-default-rtdb.firebaseio.com/", 
        projectId: "groups-85638",
        storageBucket: "groups-85638.appspot.com",
        messagingSenderId: "751289139753",
        appId: "1:751289139753:web:83e9bcb431c1a5ebfbd238"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentUser = null;
    let activeChatEmail = "general"; // Set a default room so it works instantly

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('user-email-display').innerText = user.email;
            startChat("general"); // Auto-load general chat on login
        } else {
            window.location.href = "index.html";
        }
    });

    window.startChat = function(email) {
        activeChatEmail = email;
        document.getElementById('current-chat-name').innerText = email;
        
        // Create a unique ID for the chat room
        const chatID = email === "general" ? "general" : [currentUser.email, email].sort().join('_').replace(/\./g, '_');
        const messagesRef = ref(db, 'chats/' + chatID);

        // Listen for messages
        onValue(messagesRef, (snapshot) => {
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(m => {
                    const div = document.createElement('div');
                    const isMe = m.sender === currentUser.email;
                    div.className = `msg ${isMe ? 'sent' : 'received'}`;
                    div.innerHTML = `<span class="msg-sender">${m.sender}</span>${m.text}`;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        });
    };

    document.getElementById('send-btn').addEventListener('click', () => {
        const messageInput = document.getElementById('message-input');
        const text = messageInput.value;
        
        if (text.trim() !== "" && currentUser) {
            const chatID = activeChatEmail === "general" ? "general" : [currentUser.email, activeChatEmail].sort().join('_').replace(/\./g, '_');
            
            push(ref(db, 'chats/' + chatID), {
                sender: currentUser.email,
                text: text,
                timestamp: serverTimestamp()
            }).then(() => {
                console.log("Message sent!");
                messageInput.value = "";
            }).catch((error) => {
                alert("Error sending: " + error.message);
            });
        }
    });

    // Enter key support
    document.getElementById('message-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('send-btn').click();
    });

    window.toggleSettings = () => document.getElementById('settings-panel').classList.toggle('open');
    window.logout = () => signOut(auth);
</script>
