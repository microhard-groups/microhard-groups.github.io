<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups | Chat</title>
    <style>
        :root { --primary: #0084ff; --bg: #0f172a; }
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            display: flex; height: 100vh; overflow: hidden;
        }
        .main-chat { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
        
        #messages { 
            flex: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 12px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .msg { 
            max-width: 70%; padding: 12px 16px; border-radius: 18px; 
            background: #334155; align-self: flex-start;
            font-size: 0.95rem; line-height: 1.4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .input-area { padding: 20px; display: flex; gap: 12px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        
        input { 
            flex: 1; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 1rem;
        }
        
        input:focus { border-color: var(--primary); }

        button { 
            padding: 0 24px; background: var(--primary); border: none; 
            border-radius: 12px; color: white; font-weight: 700; cursor: pointer;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="main-chat">
        <div id="messages">
            </div>

        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJ55WRtAvAXaUerycWjb1-Zf1E-VEmDDo",
            authDomain: "groups-85638.firebaseapp.com",
            databaseURL: "https://groups-85638-default-rtdb.firebaseio.com/",
            projectId: "groups-85638",
            storageBucket: "groups-85638.appspot.com",
            messagingSenderId: "751289139753",
            appId: "1:751289139753:web:83e9bcb431c1a5ebfbd238"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const messagesDiv = document.getElementById('messages');

        sendBtn.addEventListener('click', () => {
            const msgText = messageInput.value;
            if (msgText.trim() !== "") {
                push(ref(db, 'messages'), {
                    text: msgText,
                    timestamp: Date.now()
                });
                messageInput.value = "";
            }
        });

        // Enter key to send
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });

        onValue(ref(db, 'messages'), (snapshot) => {
            messagesDiv.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerText = msg.text;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }
        });
    </script>
</body>
</html>
