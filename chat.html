<!DOCTYPE html>
<html style="background-color: #11100f;">
<head>
    <title>Groups - Chat</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #11100f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; border-right: 1px solid #3b3a39; background: #201f1e; padding: 20px; display: flex; flex-direction: column; }
        .main { flex: 1; display: flex; flex-direction: column; background: #11100f; }
        input { width: 100%; padding: 12px; background: #11100f; border: 1px solid #3b3a39; color: white; border-radius: 4px; margin-bottom: 10px; }
        #results { background: #2d2c2c; border-radius: 4px; border: 1px solid #5b5fc7; display: none; }
        .user-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #3b3a39; }
        .user-item:hover { background: #5b5fc7; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 8px; max-width: 70%; line-height: 1.4; }
        .sent { align-self: flex-end; background: #5b5fc7; }
        .received { align-self: flex-start; background: #3b3a39; }
        .footer { padding: 20px; border-top: 1px solid #3b3a39; display: flex; gap: 10px; }
        button { background: #5b5fc7; color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="margin-top:0;">Chat</h3>
    <input type="text" id="userSearch" placeholder="Search for email...">
    <div id="results"></div>
</div>

<div class="main">
    <div id="messages"></div>
    <div class="footer">
        <input type="text" id="msgInput" placeholder="Select a contact..." style="margin:0;" disabled>
        <button id="sendBtn" disabled>Send</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, get, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBJ55WRtAvAXaUerycWjb1-Zf1E-VEmDDo",
        authDomain: "groups-85638.firebaseapp.com",
        databaseURL: "https://groups-85638-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "groups-85638",
        appId: "1:751289139753:web:83e9bcb431c1a5ebfbd238"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let activeChat = null;

    onAuthStateChanged(auth, user => { if (!user) window.location.href = "index.html"; });

    document.getElementById('userSearch').oninput = async (e) => {
        const query = e.target.value.toLowerCase().trim();
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "";
        if (query.length < 3) { resDiv.style.display = "none"; return; }

        const snap = await get(ref(db, 'users'));
        if (snap.exists()) {
            let found = false;
            Object.values(snap.val()).forEach(u => {
                if (u.email.includes(query) && u.email !== auth.currentUser.email) {
                    found = true;
                    const d = document.createElement('div');
                    d.className = "user-item";
                    d.innerText = u.email;
                    d.onclick = () => {
                        activeChat = u.email;
                        resDiv.style.display = "none";
                        document.getElementById('msgInput').disabled = false;
                        document.getElementById('sendBtn').disabled = false;
                        loadMessages(u.email);
                    };
                    resDiv.appendChild(d);
                }
            });
            resDiv.style.display = found ? "block" : "none";
        }
    };

    function loadMessages(email) {
        const chatID = [auth.currentUser.email, email].sort().map(x => x.replace(/\./g, '_')).join('--');
        onValue(ref(db, 'chats/' + chatID), snap => {
            const mBox = document.getElementById('messages');
            mBox.innerHTML = "";
            if (snap.exists()) {
                Object.values(snap.val()).forEach(m => {
                    const div = document.createElement('div');
                    div.className = "msg " + (m.sender === auth.currentUser.email ? "sent" : "received");
                    div.innerText = m.text;
                    mBox.appendChild(div);
                });
                mBox.scrollTop = mBox.scrollHeight;
            }
        });
    }

    document.getElementById('sendBtn').onclick = () => {
        const val = document.getElementById('msgInput').value;
        if (!val || !activeChat) return;
        const chatID = [auth.currentUser.email, activeChat].sort().map(x => x.replace(/\./g, '_')).join('--');
        push(ref(db, 'chats/' + chatID), {
            sender: auth.currentUser.email,
            text: val,
            timestamp: serverTimestamp()
        });
        document.getElementById('msgInput').value = "";
    };
</script>
</body>
</html>
