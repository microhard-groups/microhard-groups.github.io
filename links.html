<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Legal - Groups</title>
    <style>
        :root { --primary: #5b5fc7; }
        body {
            margin: 0; padding: 0;
            background: #11100f;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 40px;
            background: rgba(32, 31, 30, 0.95);
            border-radius: 16px;
            border: 1px solid #3b3a39;
            text-align: center;
        }
        h1 { font-size: 2.2rem; margin-bottom: 8px; }
        p { color: #94a3b8; }
        .legal-links {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .legal-links a {
            color: #c4c4c4;
            text-decoration: none;
            font-size: 1.1rem;
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            transition: all 0.2s;
        }
        .legal-links a:hover {
            background: #5b5fc7;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Link Center</h1>
        <p>Official links for Groups</p>

        <div class="legal-links">
            <a href="https://group-chats.github.io/tos/terms-of-service.html">Terms of Service</a>
            <a href="https://group-chats.github.io/tos/privacy-policy.html">Privacy Policy</a>
            <a href="https://group-chats.github.io/license.html">License</a>
            <a href="https://group-chats.github.io/safety.html">Safety & Community Guidelines</a>
            <a href="https://group-chats.github.io/safety.html">Official Wiki</a>
        </div>

        <footer style="margin-top: 80px; color: #64748b; font-size: 0.85rem;">
            © 2026 Groups
        </footer>
    </div>
</body>
</html>
