<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups | Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .auth-container { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        input { display: block; margin-bottom: 10px; padding: 8px; width: 200px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; padding: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h2>Join Groups</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password (min 6 chars)">
        <button id="signup-btn">Sign Up</button>
        <p id="status-message" style="color: red; font-size: 12px;"></p>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
