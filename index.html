<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Groups | Authenticate</title>
    <style>
        :root { --primary: #0084ff; }
        body {
            margin:0; padding:0;
            font-family:'Inter',-apple-system,sans-serif;
            background:radial-gradient(circle at top left,#1e293b,#0f172a);
            color:#f8fafc; display:flex; align-items:center;
            justify-content:center; height:100vh; overflow:hidden;
        }
        .blob { position:absolute; width:300px; height:300px; background:var(--primary); filter:blur(80px); border-radius:50%; z-index:-1; opacity:0.2; }
        .auth-container {
            background:rgba(255,255,255,0.05); backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.1);
            padding:40px; border-radius:24px; width:100%; max-width:380px;
            box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); text-align:center;
        }
        h2 { font-size:1.8rem; font-weight:800; margin:0 0 24px 0; letter-spacing:-0.025em; }
        .tabs { display:flex; background:rgba(0,0,0,0.25); border-radius:12px; padding:4px; margin-bottom:28px; gap:4px; }
        .tab { flex:1; padding:10px; border:none; border-radius:8px; background:transparent; color:#94a3b8; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .tab.active { background:var(--primary); color:white; }
        .tab:hover:not(.active) { background:rgba(255,255,255,0.08); color:white; }
        .input-group { margin-bottom:14px; text-align:left; }
        input { width:100%; padding:14px 16px; background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; font-size:1rem; box-sizing:border-box; transition:border-color 0.2s; }
        input:focus { outline:none; border-color:var(--primary); }
        input::placeholder { color:#475569; }
        #auth-btn { width:100%; padding:14px; background:var(--primary); color:white; border:none; border-radius:12px; font-size:1rem; font-weight:600; cursor:pointer; margin-top:6px; }
        #auth-btn:hover { opacity:0.9; }
        #auth-btn:disabled { background:#334155; cursor:not-allowed; }
        #status-message { margin-top:16px; font-size:0.85rem; color:#ff4b4b; min-height:20px; }
        .success { color:#4ade80 !important; }
    </style>
</head>
<body>
    <div class="blob" style="top:10%;left:10%;"></div>
    <div class="blob" style="bottom:10%;right:10%;background:#7c3aed;"></div>

    <div class="auth-container">
        <h2 id="auth-title">Welcome back</h2>
        <div class="tabs">
            <button class="tab active" id="tab-signin">Sign In</button>
            <button class="tab" id="tab-signup">Sign Up</button>
        </div>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address" spellcheck="false" autocomplete="email">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        </div>
        <div class="input-group" id="confirm-group" style="display:none;">
            <input type="password" id="confirm-password" placeholder="Confirm Password">
        </div>
        <button id="auth-btn">Sign In</button>
        <p id="status-message"></p>
    </div>

    <script type="module">
        import { initializeApp } from 'https://esm.sh/firebase/app';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification } from 'https://esm.sh/firebase/auth';
        import { getDatabase, ref, set } from 'https://esm.sh/firebase/database';

        const app = initializeApp({
            apiKey: "AIzaSyBJ55WRtAvAXaUerycWjb1-Zf1E-VEmDDo",
            authDomain: "groups-85638.firebaseapp.com",
            databaseURL: "https://groups-85638-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "groups-85638",
            appId: "1:751289139753:web:83e9bcb431c1a5ebfbd238"
        });
        const auth = getAuth(app);
        const db = getDatabase(app);
        let mode = 'signin';

        function setMode(newMode) {
            mode = newMode;
            document.getElementById('auth-title').textContent = mode === 'signin' ? 'Welcome back' : 'Create account';
            document.getElementById('auth-btn').textContent = mode === 'signin' ? 'Sign In' : 'Sign Up';
            document.getElementById('tab-signin').classList.toggle('active', mode === 'signin');
            document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
            document.getElementById('confirm-group').style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById('status-message').textContent = '';
            document.getElementById('status-message').className = '';
        }

        async function handleAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const status = document.getElementById('status-message');
            const btn = document.getElementById('auth-btn');

            if (!email || !password) { status.textContent = 'Please fill in all fields.'; return; }

            if (mode === 'signup') {
                const confirm = document.getElementById('confirm-password').value;
                if (password !== confirm) { status.textContent = 'Passwords do not match.'; return; }
                if (password.length < 6) { status.textContent = 'Password must be at least 6 characters.'; return; }
            }

            btn.disabled = true;
            btn.textContent = 'Please wait...';
            status.textContent = '';

            try {
                if (mode === 'signin') {
                    const userCred = await signInWithEmailAndPassword(auth, email, password);
                    if (!userCred.user.emailVerified) {
                        await auth.signOut();
                        status.className = '';
                        status.textContent = 'Please verify your email before signing in. Check your inbox and your spam folder.';
                        btn.disabled = false;
                        btn.textContent = 'Sign In';
                        return;
                    }
                    window.location.href = 'chat.html';
                } else {
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(userCred.user);
                    // Save to DB so they're searchable (we save even before verification
                    // so others can find them once they verify)
                    await set(ref(db, 'users/' + userCred.user.uid), {
                        email: email.toLowerCase(),
                        uid: userCred.user.uid
                    });
                    await auth.signOut();
                    status.className = 'success';
                    status.textContent = '✓ Account created! Check your email to verify your account, then sign in.';
                    btn.disabled = false;
                    setMode('signin');
                    btn.textContent = 'Sign In';
                }
            } catch (err) {
                const errorMap = {
                    'auth/user-not-found': 'No account found with this email.',
                    'auth/wrong-password': 'Incorrect password.',
                    'auth/invalid-credential': 'Invalid email or password.',
                    'auth/email-already-in-use': 'An account already exists with this email.',
                    'auth/invalid-email': 'Please enter a valid email address.',
                    'auth/too-many-requests': 'Too many attempts. Please try again later.',
                };
                status.className = '';
                status.textContent = errorMap[err.code] || err.message;
                btn.disabled = false;
                setMode(mode);
            }
        }

        document.getElementById('tab-signin').addEventListener('click', () => setMode('signin'));
        document.getElementById('tab-signup').addEventListener('click', () => setMode('signup'));
        document.getElementById('auth-btn').addEventListener('click', handleAuth);
        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
    </script>
</body>
</html>
